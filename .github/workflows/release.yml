name: Build and Release Wheels

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            platform: linux
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
          - name: windows
            runner: windows-latest
            platform: windows
          - name: macos
            runner: macos-latest
            platform: macos
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Install zig for Linux manylinux builds
        if: matrix.platform == 'linux'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Build wheels (Linux)
        if: matrix.platform == 'linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --manifest-path crates/fast_h2m_py/Cargo.toml --release --strip --out dist --zig --interpreter python3.8 --features extension-module

      - name: Build wheels (Windows/macOS)
        if: matrix.platform == 'windows' || matrix.platform == 'macos'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --manifest-path crates/fast_h2m_py/Cargo.toml --release --strip --out dist --features extension-module

      - name: Verify wheels are abi3
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "No wheels were built in dist/" >&2
            exit 1
          fi
          for wheel in "${wheels[@]}"; do
            name="$(basename "$wheel")"
            if [[ "$name" != *abi3* ]]; then
              echo "Expected abi3 wheel, got: $name" >&2
              exit 1
            fi
          done

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*.whl

      - name: Upload wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path crates/fast_h2m_py/Cargo.toml --out dist

      - name: Upload sdist as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

      - name: Upload sdist to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/fast-h2m
    permissions:
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: "wheels-*"
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: "sdist"
          merge-multiple: true

      - name: List files to upload
        run: ls -lah dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
